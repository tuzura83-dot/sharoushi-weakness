    --teal-400: #26A69A;
    --teal-600: #00897B;
    --amber-50: #FFF8E1;
    --amber-100: #FFECB3;
    --amber-400: #FFA726;

    --coral-50: #FBE9E7;

    color: var(--text-primary);
    min-height: 100dvh;

    max-width: 480px;
    margin: 0 auto;

  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 12px;
  }

    background: linear-gradient(135deg, var(--pink-400), var(--purple-400));
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 12px 32px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:active { transform: scale(0.96); opacity: 0.9; }

  .btn-secondary {
    background: var(--purple-50);
    color: var(--purple-600);
    border: 1px solid var(--purple-100);

    padding: 8px 20px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secondary:active { transform: scale(0.96); }

  .btn-back {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    padding: 4px 0;
    -webkit-tap-highlight-color: transparent;
  }

  .progress-bar {
    height: 8px;
    background: var(--pink-50);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .subject-card {

</style>

let state = loadState();
let currentView = 'home';
let selectedSubject = null;
let dashboardTab = 'weakness'; // 'weakness' | 'progress' | 'plan'

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  const subjects = {};
  SUBJECTS.forEach(s => { subjects[s.id] = { records: [] }; });
  return { subjects, created: new Date().toISOString() };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getRate(id) {
  const recs = state.subjects[id]?.records || [];
  if (recs.length === 0) return null;
  let correct = 0, total = 0;
  recs.forEach(r => { correct += r.correct; total += r.total; });
  return Math.round((correct / total) * 100);
}

function getRecentRate(id, n) {
  const recs = state.subjects[id]?.records || [];
  if (recs.length === 0) return null;
  const recent = recs.slice(-n);
  let correct = 0, total = 0;
  recent.forEach(r => { correct += r.correct; total += r.total; });
  return Math.round((correct / total) * 100);
}

function getTrend(id) {
  const recs = state.subjects[id]?.records || [];
  if (recs.length < 2) return null;
  const half = Math.floor(recs.length / 2);
  const first = recs.slice(0, half);
  const second = recs.slice(half);
  let r1c = 0, r1t = 0, r2c = 0, r2t = 0;
  first.forEach(r => { r1c += r.correct; r1t += r.total; });
  second.forEach(r => { r2c += r.correct; r2t += r.total; });
  const rate1 = r1t > 0 ? (r1c / r1t) * 100 : 0;
  const rate2 = r2t > 0 ? (r2c / r2t) * 100 : 0;
  return Math.round(rate2 - rate1);
}

function getWrongCount(id) {
  const recs = state.subjects[id]?.records || [];
  let wrong = 0;
  recs.forEach(r => { wrong += (r.total - r.correct); });
  return wrong;
}

function getLastDate(id) {
  const recs = state.subjects[id]?.records || [];
  if (recs.length === 0) return null;
  return recs[recs.length - 1].date;
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  return Math.floor((new Date() - new Date(dateStr)) / 86400000);
}

function daysUntilExam() {
  return Math.max(0, Math.ceil((EXAM_DATE - new Date()) / 86400000));
}

function getTodayMessage() {
  const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
  return MESSAGES[dayOfYear % MESSAGES.length];
}

function rateColor(rate) {
  if (rate === null) return 'var(--text-hint)';
  if (rate >= 80) return 'var(--teal-600)';
  if (rate >= 60) return 'var(--purple-600)';
  return 'var(--pink-600)';
}

function rateGradient(rate) {
  if (rate >= 80) return 'linear-gradient(135deg, var(--teal-400), var(--teal-600))';
  if (rate >= 60) return 'linear-gradient(135deg, var(--purple-400), var(--purple-600))';
  return 'linear-gradient(135deg, var(--pink-400), var(--pink-600))';
}

function getPriorityScore(id) {
  const rate = getRate(id);
  const ds = daysSince(getLastDate(id));
  const recs = state.subjects[id]?.records?.length || 0;
  let score = 0;
  // Lower rate = higher priority
  if (rate === null) score += 50;
  else score += Math.max(0, 100 - rate);
  // Longer since last study = higher priority
  if (ds === null) score += 30;
  else if (ds >= 14) score += 25;
  else if (ds >= 7) score += 15;
  else if (ds >= 3) score += 5;
  // Fewer records = higher priority
  if (recs === 0) score += 20;
  else if (recs <= 2) score += 10;
  // Negative trend = higher priority
  const trend = getTrend(id);
  if (trend !== null && trend < -5) score += 15;
  return score;
}

function getWeaknessRanking() {
  return SUBJECTS.map(s => ({
    ...s,
    rate: getRate(s.id),
    recentRate: getRecentRate(s.id, 3),
    trend: getTrend(s.id),
    wrongCount: getWrongCount(s.id),
    daysSince: daysSince(getLastDate(s.id)),
    records: state.subjects[s.id]?.records?.length || 0,
    priority: getPriorityScore(s.id),
  })).sort((a, b) => b.priority - a.priority);
}

function getMemos(id) {
  const recs = state.subjects[id]?.records || [];
  const memos = [];
  recs.forEach(r => {
    if (r.memo && r.memo.trim()) memos.push({ text: r.memo.trim(), date: r.date });
  });
  return memos;
}

  const weeks = 12;

  const data = [];
  for (let w = weeks - 1; w >= 0; w--) {
    const week = [];
    for (let d = 0; d < 7; d++) {
      const date = new Date(today);
      date.setDate(date.getDate() - (w * 7 + (6 - d)));
      const dateStr = date.toISOString().split('T')[0];
      let count = 0;
      SUBJECTS.forEach(s => {
        (state.subjects[s.id]?.records || []).forEach(r => {
          if (r.date === dateStr) count++;
        });
      });
      week.push({ date: dateStr, count, day: date.getDay() });
    }
    data.push(week);
  }
  return data;
}

function render() {
  const app = document.getElementById('app');
  if (currentView === 'home') renderHome(app);
  else if (currentView === 'dashboard') renderDashboard(app);
  else if (currentView === 'add') renderAdd(app);
  else if (currentView === 'detail') renderDetail(app);
  else if (currentView === 'radar') renderRadar(app);
}

function renderHome(app) {
  const days = daysUntilExam();
  const totalDays = Math.ceil((EXAM_DATE - new Date('2025-09-01')) / 86400000);
  const elapsed = totalDays - days;
  const progress = Math.min(1, elapsed / totalDays);
  const circumference = 2 * Math.PI * 50;
  const offset = circumference * (1 - progress);

  const totalRecords = SUBJECTS.reduce((sum, s) => sum + (state.subjects[s.id]?.records?.length || 0), 0);
  const subjectsStudied = SUBJECTS.filter(s => (state.subjects[s.id]?.records?.length || 0) > 0).length;
  let avgRate = 0, rateCount = 0;
  SUBJECTS.forEach(s => {
    const r = getRate(s.id);
    if (r !== null) { avgRate += r; rateCount++; }
  });
  avgRate = rateCount > 0 ? Math.round(avgRate / rateCount) : 0;

  // Top 3 weaknesses
  const ranking = getWeaknessRanking();
  const topWeak = ranking.filter(s => s.rate !== null && s.rate < 80).slice(0, 3);

  let h = `<div class="fade-in">`;

  // Countdown
  h += `<div style="text-align:center; margin-bottom:20px;">

          <linearGradient id="countdown-gradient" x1="0%" y1="0%" x2="100%" y2="100%">

            <stop offset="100%" style="stop-color:var(--purple-400)"/>

        </defs>
        <circle class="ring-bg" cx="60" cy="60" r="50" fill="none" stroke-width="8"/>
        <circle class="ring-fill" cx="60" cy="60" r="50" fill="none" stroke-width="8"

      </svg>
      <div class="countdown-center">
        <div style="font-size:32px; font-weight:700; color:var(--pink-600); line-height:1;">${days}</div>
        <div style="font-size:11px; color:var(--text-secondary); margin-top:2px;">日</div>
      </div>
    </div>
    <p style="font-size:13px; color:var(--text-secondary); margin-top:8px;">試験日まで（8/23予定）</p>
  </div>`;

  // Encouragement
  h += `<div class="encouragement">
    <p style="font-size:14px; color:var(--pink-700); font-weight:500; line-height:1.6;">${getTodayMessage()}</p>
  </div>`;

  // Metrics
  h += `<div style="display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:8px; margin-bottom:16px;">
    <div class="metric-card" style="background:var(--pink-50);">
      <div style="font-size:11px; color:var(--pink-500); font-weight:500;">記録回数</div>
      <div style="font-size:24px; font-weight:700; color:var(--pink-700);">${totalRecords}</div>
    </div>
    <div class="metric-card" style="background:var(--purple-50);">
      <div style="font-size:11px; color:var(--purple-400); font-weight:500;">学習済み</div>
      <div style="font-size:24px; font-weight:700; color:var(--purple-600);">${subjectsStudied}<span style="font-size:14px;">/10</span></div>
    </div>
    <div class="metric-card" style="background:var(--teal-50);">
      <div style="font-size:11px; color:var(--teal-400); font-weight:500;">平均正答率</div>
      <div style="font-size:24px; font-weight:700; color:var(--teal-600);">${avgRate}<span style="font-size:14px;">%</span></div>
    </div>
  </div>`;

  // Weakness alert (top weaknesses)
  if (topWeak.length > 0) {
    h += `<div class="card" style="border-left:4px solid var(--pink-400); cursor:pointer;" onclick="currentView='dashboard'; dashboardTab='weakness'; render();">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">

    }

    h += `<div class="subject-card" onclick="selectedSubject='${s.id}'; currentView='detail'; render();">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <div style="display:flex; align-items:center; gap:8px;">
          <span style="font-size:18px;">${s.icon}</span>
          <span style="font-size:14px; font-weight:500;">${s.name}</span>
        </div>
        <div style="display:flex; align-items:center; gap:6px;">
          ${alertHtml}
          ${trendHtml}
          <span style="font-size:16px; font-weight:700; color:${rateColor(rate)};">${rate !== null ? rate + '%' : '--'}</span>
        </div>
      </div>
      <div class="progress-bar">
        ${rate !== null ? `<div class="progress-fill" style="width:${rate}%; background:${rateGradient(rate)};"></div>` : ''}

    </div>`;
  });

  // Add button
  h += `<div style="text-align:center; margin-top:20px;">

function renderDashboard(app) {
  const ranking = getWeaknessRanking();

  let h = `<div class="fade-in">`;
  h += `<button class="btn-back" onclick="currentView='home'; render();">← もどる</button>`;
  h += `<div style="text-align:center; margin:12px 0 16px;">

  </div>`;

  // Tabs
  h += `<div class="tab-bar">
    <button class="tab-btn ${dashboardTab === 'weakness' ? 'active' : ''}" onclick="dashboardTab='weakness'; render();">弱点ランキング</button>
    <button class="tab-btn ${dashboardTab === 'progress' ? 'active' : ''}" onclick="dashboardTab='progress'; render();">学習ヒートマップ</button>
    <button class="tab-btn ${dashboardTab === 'plan' ? 'active' : ''}" onclick="dashboardTab='plan'; render();">学習プラン</button>
  </div>`;

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: studied.map(s => s.short),
          datasets: [{
            label: '間違い数',
            data: studied.map(s => s.wrongCount),
            backgroundColor: studied.map(s => {
              if (s.rate < 60) return 'rgba(236, 64, 122, 0.7)';
              if (s.rate < 80) return 'rgba(171, 71, 188, 0.6)';
              return 'rgba(38, 166, 154, 0.5)';
            }),
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,

function renderWeaknessTab(ranking) {
  let h = '';
  const hasData = ranking.some(s => s.rate !== null);

  if (!hasData) {
    h += `<div style="text-align:center; padding:40px 0;">
      <p style="font-size:36px; margin-bottom:8px;">📊</p>
      <p style="font-size:14px; color:var(--text-hint);">まだデータがありません</p>
      <p style="font-size:12px; color:var(--text-hint); margin-top:4px;">学習を記録すると弱点が分析されます</p>
      <button class="btn-primary" style="margin-top:16px;" onclick="currentView='add'; render();">記録する</button>
    </div>`;
    return h;
  }

  // Weakness ranking list
  h += `<div class="card" style="padding:12px;">
    <p style="font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:10px;">優先度が高い科目</p>`;

  ranking.forEach((s, i) => {
    const bgColor = s.rate === null ? 'var(--pink-50)'
      : s.rate < 60 ? 'rgba(255,240,245,0.8)'
      : s.rate < 80 ? 'rgba(243,229,245,0.6)'
      : 'rgba(224,242,241,0.5)';
    const rankColor = i < 3 ? (i === 0 ? 'var(--pink-500)' : i === 1 ? 'var(--purple-400)' : 'var(--amber-400)') : 'var(--text-hint)';

    let statusTag = '';
    if (s.rate === null) statusTag = `<span class="priority-badge" style="background:var(--pink-100); color:var(--pink-600);">未着手</span>`;
    else if (s.rate < 60) statusTag = `<span class="priority-badge" style="background:var(--red-100); color:var(--red-600);">要強化</span>`;
    else if (s.rate < 80) statusTag = `<span class="priority-badge" style="background:var(--amber-100); color:var(--amber-600);">あと少し</span>`;
    else statusTag = `<span class="priority-badge" style="background:var(--teal-100); color:var(--teal-600);">順調</span>`;

    let trendHtml = '';
    if (s.trend !== null) {
      trendHtml = `<span class="trend-arrow" style="color:${s.trend >= 0 ? 'var(--teal-600)' : 'var(--red-400)'};">${s.trend >= 0 ? '↑' : '↓'}${Math.abs(s.trend)}%</span>`;
    }

    let staleTag = '';
    if (s.daysSince !== null && s.daysSince >= 7) {
      staleTag = `<span class="tag" style="background:var(--coral-50); color:var(--coral-400); font-size:10px;">${s.daysSince}日前</span>`;
    }

    h += `<div class="weakness-rank" style="background:${bgColor};" onclick="selectedSubject='${s.id}'; currentView='detail'; render();">
      <span class="rank-number" style="background:${rankColor};">${i + 1}</span>
      <span style="font-size:16px;">${s.icon}</span>
      <div style="flex:1; min-width:0;">
        <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
          <span style="font-size:13px; font-weight:500;">${s.short}</span>
          ${statusTag}
          ${staleTag}
        </div>
        <div style="display:flex; align-items:center; gap:6px; margin-top:3px;">
          <span style="font-size:11px; color:var(--text-hint);">記録${s.records}回</span>
          ${s.wrongCount > 0 ? `<span style="font-size:11px; color:var(--pink-500);">間違い${s.wrongCount}問</span>` : ''}
        </div>
      </div>
      <div style="text-align:right;">
        <div style="display:flex; align-items:center; gap:4px; justify-content:flex-end;">
          ${trendHtml}
          <span style="font-size:16px; font-weight:700; color:${rateColor(s.rate)};">${s.rate !== null ? s.rate + '%' : '--'}</span>
        </div>
      </div>
    </div>`;
  });

  // Wrong count chart

      <div style="position:relative; height:${Math.max(180, studied.length * 32)}px;">
        <canvas id="weakness-chart"></canvas>
      </div>
    </div>`;
  }

  // Memos (wrong point notes)
  const allMemos = [];
  SUBJECTS.forEach(s => {
    getMemos(s.id).forEach(m => {
      allMemos.push({ ...m, subject: s.short, icon: s.icon, subjectId: s.id });
    });
  });
  if (allMemos.length > 0) {
    allMemos.sort((a, b) => b.date.localeCompare(a.date));
    h += `<div class="card" style="padding:12px;">
      <p style="font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:10px;">苦手メモ一覧</p>`;
    allMemos.slice(0, 15).forEach(m => {

      </div>`;
    });
    h += `</div>`;
  }

  return h;
}

function renderHeatmapTab() {
  const heatmap = getStudyHeatmap();
  const dayLabels = ['日', '月', '火', '水', '木', '金', '土'];
  let h = '';

  h += `<div class="card" style="padding:14px;">
    <p style="font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:10px;">直近12週間の学習記録</p>
    <div style="overflow-x:auto;">
      <div style="min-width:260px;">`;

  // Day labels + heatmap grid
  for (let d = 0; d < 7; d++) {
    h += `<div class="heatmap-row">
      <span class="heatmap-label">${dayLabels[d]}</span>`;
    heatmap.forEach(week => {
      const cell = week[d];
      let color = 'var(--pink-50)';
      if (cell.count === 1) color = 'var(--pink-200)';
      else if (cell.count === 2) color = 'var(--pink-400)';
      else if (cell.count >= 3) color = 'var(--pink-600)';
      const today = new Date().toISOString().split('T')[0];
      const border = cell.date === today ? '2px solid var(--pink-500)' : 'none';
      h += `<div class="heatmap-cell" style="background:${color}; border:${border};" title="${cell.date}: ${cell.count}件"></div>`;
    });
    h += `</div>`;
  }

  h += `</div></div>
    <div style="display:flex; align-items:center; gap:4px; justify-content:flex-end; margin-top:8px;">
      <span style="font-size:10px; color:var(--text-hint);">少ない</span>
      <div class="heatmap-cell" style="background:var(--pink-50);"></div>
      <div class="heatmap-cell" style="background:var(--pink-200);"></div>
      <div class="heatmap-cell" style="background:var(--pink-400);"></div>
      <div class="heatmap-cell" style="background:var(--pink-600);"></div>
      <span style="font-size:10px; color:var(--text-hint);">多い</span>
    </div>
  </div>`;

  // Study frequency per subject
  h += `<div class="card" style="padding:14px;">
    <p style="font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:10px;">科目別学習頻度（直近30日）</p>`;
  const thirtyDaysAgo = new Date();
  thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
  const thirtyStr = thirtyDaysAgo.toISOString().split('T')[0];

  const freqData = SUBJECTS.map(s => {
    const recs = state.subjects[s.id]?.records || [];
    const recent = recs.filter(r => r.date >= thirtyStr);
    return { ...s, count: recent.length };
  }).sort((a, b) => a.count - b.count);

  const maxCount = Math.max(...freqData.map(f => f.count), 1);

  freqData.forEach(f => {
    const pct = Math.round((f.count / maxCount) * 100);
    h += `<div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
      <span style="font-size:12px; width:28px; text-align:right; color:var(--text-secondary); font-weight:500;">${f.short}</span>
      <div style="flex:1; height:8px; background:var(--pink-50); border-radius:4px; overflow:hidden;">
        <div style="height:100%; width:${pct}%; background:${f.count === 0 ? 'var(--text-hint)' : 'linear-gradient(135deg, var(--purple-400), var(--pink-400))'}; border-radius:4px; transition:width 0.4s;"></div>
      </div>
      <span style="font-size:12px; color:${f.count === 0 ? 'var(--red-400)' : 'var(--text-secondary)'}; font-weight:500; width:24px;">${f.count}回</span>
    </div>`;
  });
  h += `</div>`;

  return h;
}

function renderPlanTab(ranking) {
  let h = '';

  const hasData = ranking.some(s => s.rate !== null);
  if (!hasData) {
    h += `<div style="text-align:center; padding:40px 0;">
      <p style="font-size:36px; margin-bottom:8px;">📝</p>
      <p style="font-size:14px; color:var(--text-hint);">データが増えると学習プランが表示されます</p>
    </div>`;
    return h;
  }

  // Today's recommended subjects
  h += `<div class="card" style="border-left:4px solid var(--purple-400); padding:16px;">
    <p style="font-size:14px; font-weight:700; color:var(--purple-600); margin-bottom:4px;">今日のおすすめ学習</p>
    <p style="font-size:12px; color:var(--text-secondary); margin-bottom:12px;">優先度の高い順に3科目をピックアップ</p>`;

  const topThree = ranking.slice(0, 3);
  topThree.forEach((s, i) => {
    let reason = '';
    if (s.rate === null) reason = '未着手なので、まずは取り組もう';
    else if (s.rate < 60) reason = `正答率${s.rate}%。基礎の確認がおすすめ`;
    else if (s.daysSince !== null && s.daysSince >= 7) reason = `${s.daysSince}日間やってないので復習しよう`;
    else if (s.trend !== null && s.trend < -5) reason = `正答率が下降傾向。もう一度確認を`;
    else if (s.rate < 80) reason = `正答率${s.rate}%。もう少しで安定圏`;
    else reason = '維持のために定期的に復習を';

    const targetQuestions = s.rate === null ? 10 : s.rate < 60 ? 20 : s.rate < 80 ? 15 : 10;

    h += `<div style="background:${i === 0 ? 'var(--pink-50)' : i === 1 ? 'var(--purple-50)' : 'var(--teal-50)'}; border-radius:var(--radius-sm); padding:12px; margin-bottom:${i < 2 ? '8px' : '0'};">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
        <span style="font-size:20px;">${s.icon}</span>
        <div>
          <span style="font-size:14px; font-weight:700; color:var(--text-primary);">${s.name}</span>
          <span style="font-size:11px; color:var(--text-hint); margin-left:6px;">目安${targetQuestions}問</span>
        </div>
      </div>
      <p style="font-size:12px; color:var(--text-secondary); line-height:1.5; padding-left:28px;">${reason}</p>
    </div>`;
  });
  h += `</div>`;

  // Targets and goals
  h += `<div class="card" style="padding:16px;">
    <p style="font-size:14px; font-weight:700; color:var(--text-primary); margin-bottom:12px;">科目別ステータス</p>`;

  const categories = [
    { label: '要強化（60%未満）', items: ranking.filter(s => s.rate !== null && s.rate < 60), color: 'var(--pink-600)', bg: 'var(--pink-50)' },
    { label: 'あと少し（60〜79%）', items: ranking.filter(s => s.rate !== null && s.rate >= 60 && s.rate < 80), color: 'var(--purple-600)', bg: 'var(--purple-50)' },
    { label: '順調（80%以上）', items: ranking.filter(s => s.rate !== null && s.rate >= 80), color: 'var(--teal-600)', bg: 'var(--teal-50)' },
    { label: '未着手', items: ranking.filter(s => s.rate === null), color: 'var(--text-hint)', bg: 'var(--pink-50)' },
  ];

  categories.forEach(cat => {
    if (cat.items.length === 0) return;
    h += `<div style="margin-bottom:12px;">
      <p style="font-size:12px; font-weight:700; color:${cat.color}; margin-bottom:6px;">${cat.label}</p>
      <div style="display:flex; flex-wrap:wrap; gap:4px;">`;
    cat.items.forEach(s => {
      h += `<span style="font-size:12px; background:${cat.bg}; color:${cat.color}; padding:4px 10px; border-radius:12px; font-weight:500;">${s.icon} ${s.short}${s.rate !== null ? ' ' + s.rate + '%' : ''}</span>`;
    });
    h += `</div></div>`;
  });

  h += `</div>`;

  // Advice
  const days = daysUntilExam();
  const weakCount = ranking.filter(s => s.rate !== null && s.rate < 60).length;
  const untouchedCount = ranking.filter(s => s.rate === null).length;

  h += `<div class="encouragement" style="text-align:left;">
    <p style="font-size:14px; font-weight:700; color:var(--pink-700); margin-bottom:8px;">ひとことアドバイス</p>`;

  if (untouchedCount >= 5) {
    h += `<p style="font-size:13px; color:var(--text-primary); line-height:1.6;">まだ手をつけていない科目が${untouchedCount}科目あるよ。まずは全科目を一通り触ってみるのが大事。1科目10問でもOK!</p>`;
  } else if (weakCount >= 3) {
    h += `<p style="font-size:13px; color:var(--text-primary); line-height:1.6;">苦手科目が${weakCount}つあるけど、焦らなくて大丈夫。1日1科目ずつ、基本問題から固めていこう。まずは60%を目指そう。</p>`;
  } else if (days < 60) {
    h += `<p style="font-size:13px; color:var(--text-primary); line-height:1.6;">試験まであと${days}日。苦手科目の底上げと、得意科目のキープを両立させよう。過去問中心に切り替えるのもアリ。</p>`;
  } else {
    h += `<p style="font-size:13px; color:var(--text-primary); line-height:1.6;">いい調子で進んでるね。弱点科目を少しずつ潰していけば、合格がグッと近づくよ。このペースを続けよう!</p>`;
  }
  h += `</div>`;

  return h;
}

function renderAdd(app) {
  const preselect = selectedSubject || SUBJECTS[0].id;
  let h = `<div class="fade-in">`;
  h += `<button class="btn-back" onclick="currentView='home'; render();">← もどる</button>`;
  h += `<div style="text-align:center; margin:16px 0 20px;">
    <p style="font-size:18px; font-weight:700; color:var(--text-primary);">学習を記録する</p>
    <p style="font-size:12px; color:var(--text-secondary); margin-top:4px;">今日もおつかれさま</p>
  </div>`;

  h += `<div class="card">
    <div style="margin-bottom:14px;">
      <label>科目</label>
      <select id="add-subject">
        ${SUBJECTS.map(s => `<option value="${s.id}" ${s.id === preselect ? 'selected' : ''}>${s.icon} ${s.name}</option>`).join('')}
      </select>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;">
      <div>
        <label>正答数</label>
        <input id="add-correct" type="number" min="0" value="0" inputmode="numeric">
      </div>
      <div>
        <label>問題数</label>
        <input id="add-total" type="number" min="1" value="10" inputmode="numeric">
      </div>
    </div>
    <div style="margin-bottom:14px;">
      <label>日付</label>
      <input id="add-date" type="date" value="${new Date().toISOString().split('T')[0]}">
    </div>
    <div style="margin-bottom:6px;">
      <label>苦手メモ（任意）</label>
      <textarea id="add-memo" rows="2" placeholder="間違えたポイント、覚えにくい箇所など" style="resize:vertical;"></textarea>
    </div>
  </div>`;

  h += `<div style="text-align:center; margin-top:16px;">
    <button class="btn-primary" onclick="doAdd();">記録する</button>
  </div>`;
  h += `</div>`;
  app.innerHTML = h;
}

function doAdd() {
  const subject = document.getElementById('add-subject').value;
  const correct = parseInt(document.getElementById('add-correct').value) || 0;
  const total = parseInt(document.getElementById('add-total').value) || 1;
  const date = document.getElementById('add-date').value;
  const memo = document.getElementById('add-memo').value;

  if (correct > total) { alert('正答数が問題数を超えています'); return; }
  if (total <= 0) { alert('問題数は1以上にしてください'); return; }
  if (!date) { alert('日付を入力してください'); return; }

  state.subjects[subject].records.push({ correct, total, date, memo, id: Date.now() });
  state.subjects[subject].records.sort((a, b) => a.date.localeCompare(b.date));
  saveState();
  selectedSubject = null;
  currentView = 'home';
  render();
}

function renderDetail(app) {
  const sid = selectedSubject;
  const subj = SUBJECTS.find(s => s.id === sid);
  const recs = state.subjects[sid]?.records || [];
  const rate = getRate(sid);
  const recentRate = getRecentRate(sid, 3);
  const trend = getTrend(sid);
  const wrongCount = getWrongCount(sid);

  let h = `<div class="fade-in">`;
  h += `<button class="btn-back" onclick="currentView='home'; render();">← もどる</button>`;

  h += `<div style="text-align:center; margin:16px 0 20px;">
    <span style="font-size:36px;">${subj.icon}</span>
    <p style="font-size:18px; font-weight:700; color:var(--text-primary); margin-top:4px;">${subj.name}</p>
    <p style="font-size:36px; font-weight:700; color:${rateColor(rate)}; margin-top:4px;">${rate !== null ? rate + '%' : '--'}</p>
    <p style="font-size:12px; color:var(--text-secondary);">通算正答率</p>
  </div>`;

  // Detail metrics
  if (recs.length > 0) {
    let totalQ = 0, totalC = 0;
    recs.forEach(r => { totalQ += r.total; totalC += r.correct; });
    h += `<div style="display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:8px; margin-bottom:12px;">
      <div class="metric-card" style="background:var(--pink-50);">
        <div style="font-size:11px; color:var(--pink-500); font-weight:500;">間違い数</div>
        <div style="font-size:20px; font-weight:700; color:var(--pink-700);">${wrongCount}</div>
      </div>
      <div class="metric-card" style="background:var(--purple-50);">
        <div style="font-size:11px; color:var(--purple-400); font-weight:500;">直近3回</div>
        <div style="font-size:20px; font-weight:700; color:${rateColor(recentRate)};">${recentRate !== null ? recentRate + '%' : '--'}</div>
      </div>
      <div class="metric-card" style="background:var(--teal-50);">
        <div style="font-size:11px; color:var(--teal-400); font-weight:500;">変化</div>
        <div style="font-size:20px; font-weight:700; color:${trend !== null ? (trend >= 0 ? 'var(--teal-600)' : 'var(--red-400)') : 'var(--text-hint)'};">${trend !== null ? (trend >= 0 ? '+' : '') + trend + '%' : '--'}</div>
      </div>
    </div>`;
  }

  if (recs.length > 1) {
    h += `<div class="card" style="padding:12px;">
      <div style="position:relative; height:180px;">
        <canvas id="detail-chart"></canvas>
      </div>
    </div>`;
  }

  // Memos for this subject
  const memos = getMemos(sid);
  if (memos.length > 0) {
    h += `<div class="card" style="padding:12px;">
      <p style="font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:8px;">苦手メモ</p>`;
    memos.slice().reverse().forEach(m => {
      h += `<div style="padding:6px 0; border-bottom:1px solid var(--border);">
        <span style="font-size:11px; color:var(--text-hint);">${m.date}</span>
        <p style="font-size:13px; color:var(--text-primary); margin-top:2px; line-height:1.5;">${m.text}</p>
      </div>`;
    });
    h += `</div>`;
  }

  if (recs.length === 0) {
    h += `<div style="text-align:center; padding:24px 0;">
      <p style="font-size:32px; margin-bottom:8px;">🌱</p>
      <p style="font-size:14px; color:var(--text-hint);">まだ記録がありません</p>
      <p style="font-size:12px; color:var(--text-hint); margin-top:4px;">最初の一歩を踏み出そう</p>
    </div>`;
  } else {
    h += `<div style="margin-top:12px;">
      <p style="font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:8px;">記録一覧</p>`;
    recs.slice().reverse().forEach(r => {
      const pct = Math.round((r.correct / r.total) * 100);
      h += `<div class="record-item">
        <div>
          <span style="font-size:13px; color:var(--text-secondary);">${r.date}</span>
          ${r.memo ? `<span style="font-size:11px; color:var(--text-hint); margin-left:6px;">${r.memo}</span>` : ''}
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <span style="font-size:12px; color:var(--text-secondary);">${r.correct}/${r.total}</span>
          <span style="font-size:14px; font-weight:700; color:${rateColor(pct)};">${pct}%</span>
          <button class="delete-btn" onclick="deleteRecord('${sid}', ${r.id}); event.stopPropagation();">×</button>
        </div>
      </div>`;
    });
    h += `</div>`;
  }

  h += `<div style="text-align:center; margin-top:20px;">
    <button class="btn-primary" onclick="selectedSubject='${sid}'; currentView='add'; render();">この科目を記録する</button>
  </div>`;
  h += `</div>`;
  app.innerHTML = h;

  if (recs.length > 1) {
    setTimeout(() => {
      const ctx = document.getElementById('detail-chart');
      if (!ctx) return;
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: recs.map(r => r.date.slice(5)),
          datasets: [{
            data: recs.map(r => Math.round((r.correct / r.total) * 100)),
            borderColor: '#AB47BC',
            backgroundColor: 'rgba(171, 71, 188, 0.1)',
            fill: true,
            tension: 0.35,
            pointBackgroundColor: '#EC407A',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 7,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            y: { min: 0, max: 100, ticks: { callback: v => v + '%', color: '#B8A5B0', font: { size: 11 } }, grid: { color: 'rgba(200,170,190,0.15)' } },
            x: { ticks: { color: '#B8A5B0', font: { size: 11 } }, grid: { display: false } }
          },
          plugins: { legend: { display: false } }
        }
      });
    }, 80);
  }
}

function deleteRecord(sid, rid) {
  if (!confirm('この記録を削除しますか？')) return;
  state.subjects[sid].records = state.subjects[sid].records.filter(r => r.id !== rid);
  saveState();
  render();
}

function renderRadar(app) {
  let h = `<div class="fade-in">`;
  h += `<button class="btn-back" onclick="currentView='home'; render();">← もどる</button>`;

  h += `<div style="text-align:center; margin:16px 0 12px;">
    <p style="font-size:18px; font-weight:700; color:var(--text-primary);">科目バランス</p>
    <p style="font-size:12px; color:var(--text-secondary); margin-top:4px;">全体の得意・不得意を確認しよう</p>
  </div>`;

  h += `<div class="card" style="padding:12px;">
    <div style="position:relative; height:300px;">
      <canvas id="radar-chart"></canvas>
    </div>
  </div>`;

  // Alerts
  const weak = SUBJECTS.filter(s => { const r = getRate(s.id); return r !== null && r < 60; });
  const untouched = SUBJECTS.filter(s => getRate(s.id) === null);
  const stale = SUBJECTS.filter(s => { const d = daysSince(getLastDate(s.id)); return d !== null && d >= 7; });

  if (weak.length > 0 || untouched.length > 0 || stale.length > 0) {
    h += `<div style="background:var(--pink-50); border-radius:var(--radius); padding:14px 16px; margin-top:12px; border:1px solid var(--pink-100);">
      <p style="font-size:14px; font-weight:700; color:var(--pink-700); margin-bottom:8px;">気をつけたいポイント</p>`;
    if (weak.length > 0) h += `<p style="font-size:13px; color:var(--pink-600); margin-bottom:4px;">正答率60%未満 → ${weak.map(s => s.short).join('、')}</p>`;
    if (stale.length > 0) h += `<p style="font-size:13px; color:var(--amber-600); margin-bottom:4px;">7日以上ごぶさた → ${stale.map(s => s.short).join('、')}</p>`;
    if (untouched.length > 0) h += `<p style="font-size:13px; color:var(--text-secondary);">まだ未着手 → ${untouched.map(s => s.short).join('、')}</p>`;
    h += `</div>`;
  }

  h += `</div>`;
  app.innerHTML = h;

  setTimeout(() => {
    const ctx = document.getElementById('radar-chart');
    if (!ctx) return;
    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: SUBJECTS.map(s => s.short),
        datasets: [{
          data: SUBJECTS.map(s => getRate(s.id) || 0),
          backgroundColor: 'rgba(171, 71, 188, 0.15)',
          borderColor: '#AB47BC',
          borderWidth: 2,
          pointBackgroundColor: '#EC407A',
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          pointRadius: 5,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          r: {
            min: 0, max: 100,
            ticks: { stepSize: 20, callback: v => v + '%', color: '#B8A5B0', backdropColor: 'transparent', font: { size: 10 } },
            grid: { color: 'rgba(200,170,190,0.2)' },
            pointLabels: { color: '#8E7A85', font: { size: 12, family: "'Zen Maru Gothic', sans-serif", weight: '500' } }
          }
        },
        plugins: { legend: { display: false } }
      }
    });
  }, 80);
}

render();
</script>
</body>
</html>
